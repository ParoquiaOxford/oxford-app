name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
          cache-dependency-path: docs/yarn.lock

      - name: Install dependencies
        working-directory: docs
        run: yarn install --frozen-lockfile

      - name: Build project
        working-directory: docs
        env:
          VITE_API_BASE_URL_PRD: ${{ secrets.VITE_API_BASE_URL_PRD || vars.VITE_API_BASE_URL_PRD || secrets.VITE_API_BASE_URL || vars.VITE_API_BASE_URL }}
        run: yarn build

      - name: Ensure SPA fallback page
        run: cp docs/dist/index.html docs/dist/404.html

      - name: Disable Jekyll processing
        run: touch docs/dist/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
