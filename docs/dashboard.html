<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aparecida Oxford | Dashboard</title>
  </head>
  <body data-page="dashboard">
    <main class="mx-auto min-h-screen w-full max-w-6xl px-4 py-6 sm:py-8">
      <header class="mb-6 rounded-2xl border border-stone-200 bg-white p-4 shadow-sm dark:border-stone-700 dark:bg-stone-800 sm:p-6">
        <div class="flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">
          <div>
            <p class="text-xs font-semibold uppercase tracking-wide text-amber-700">Dashboard</p>
            <h1 class="text-2xl font-bold text-stone-900 dark:text-stone-100">Gestão de Repertório</h1>
            <p id="welcome-user" class="mt-1 text-sm text-stone-600 dark:text-stone-300"></p>
          </div>
          <div class="flex items-center gap-2">
            <button id="theme-toggle-btn" class="btn-secondary px-3 py-1.5 text-xs">Tema</button>
            <button id="logout-btn" class="btn-secondary">Sair</button>
          </div>
        </div>
      </header>

      <div class="mt-4 grid gap-4 xl:grid-cols-2">
        <section class="rounded-2xl border border-stone-200 bg-white p-4 shadow-sm dark:border-stone-700 dark:bg-stone-800 sm:p-6">
          <h2 class="text-lg font-semibold text-stone-900 dark:text-stone-100">Cadastrar nova música</h2>
          <p class="mt-1 text-sm text-stone-600 dark:text-stone-300">Adicione músicas ao repertório local deste dispositivo.</p>

          <form id="add-song-form" class="mt-4 grid gap-4 sm:grid-cols-2" novalidate>
            <div class="sm:col-span-2">
              <label for="new-song-title" class="block text-sm font-medium text-stone-700 dark:text-stone-200">Título</label>
              <input id="new-song-title" name="title" class="input-field mt-1" required />
            </div>

            <div>
              <label for="new-song-category" class="block text-sm font-medium text-stone-700 dark:text-stone-200">Categoria</label>
              <select id="new-song-category" name="idCategory" class="input-field mt-1" required>
                <option value="">Selecione</option>
              </select>
            </div>

            <div class="sm:col-span-2">
              <label for="new-song-letter" class="block text-sm font-medium text-stone-700 dark:text-stone-200">Letra</label>
              <textarea id="new-song-letter" name="letter" rows="4" class="input-field mt-1" required></textarea>
            </div>

            <p id="add-song-feedback" class="sm:col-span-2 hidden rounded-md border px-3 py-2 text-sm"></p>

            <div class="sm:col-span-2 flex flex-col gap-2 sm:flex-row sm:justify-end">
              <button id="cancel-edit-song-btn" type="button" class="btn-secondary hidden">Cancelar edição</button>
              <button id="submit-song-btn" type="submit" class="btn-primary">Adicionar música</button>
            </div>
          </form>
        </section>

        <section class="rounded-2xl border border-stone-200 bg-white p-4 shadow-sm dark:border-stone-700 dark:bg-stone-800 sm:p-6">
          <div class="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
            <h2 class="text-lg font-semibold text-stone-900 dark:text-stone-100">Músicas Adicionadas/Selecionadas</h2>
            <button id="generate-ppt-btn" class="btn-primary px-3 py-1.5 text-xs">Gerar repertorio</button>
          </div>

          <p id="selected-empty" class="mt-2 rounded-md border border-stone-200 bg-stone-50 px-3 py-2 text-sm text-stone-600 dark:border-stone-700 dark:bg-stone-700 dark:text-stone-300">
            Nenhuma música selecionada.
          </p>
          <div id="selected-music-list" class="mt-3 grid gap-3"></div>
        </section>
      </div>

      <section class="mt-4 grid gap-4 rounded-2xl border border-stone-200 bg-white p-4 shadow-sm dark:border-stone-700 dark:bg-stone-800 sm:grid-cols-3 sm:p-6">
        <div class="sm:col-span-2">
          <label for="search-input" class="block text-sm font-medium text-stone-700 dark:text-stone-200">Buscar por título</label>
          <input id="search-input" class="input-field mt-1" placeholder="Ex.: Canto de Entrada" />
        </div>
        <div>
          <label for="category-select" class="block text-sm font-medium text-stone-700 dark:text-stone-200">Categoria litúrgica</label>
          <select id="category-select" class="input-field mt-1">
            <option value="all">Todas</option>
          </select>
        </div>
      </section>

      <section class="mt-4 rounded-2xl border border-stone-200 bg-white p-4 shadow-sm dark:border-stone-700 dark:bg-stone-800 sm:p-6">
        <h2 class="text-lg font-semibold text-stone-900 dark:text-stone-100">Músicas disponiveis</h2>

        <div class="mb-3 flex flex-col gap-2 sm:flex-row sm:items-center sm:justify-between">
          <p id="result-count" class="text-sm text-stone-600 dark:text-stone-300"></p>
          <p id="selected-count" class="text-sm font-medium text-stone-700 dark:text-stone-200"></p>
        </div>

        <p id="dashboard-error" class="mb-3 hidden rounded-md border border-red-200 bg-red-50 px-3 py-2 text-sm text-red-700"></p>
        <p id="dashboard-empty" class="hidden rounded-md border border-stone-200 bg-stone-50 px-3 py-2 text-sm text-stone-600 dark:border-stone-700 dark:bg-stone-700 dark:text-stone-300"></p>

        <div id="music-list" class="grid gap-3"></div>
      </section>
    </main>
    <script type="module" src="./src/assets/js/app.js"></script>
  </body>
</html>
