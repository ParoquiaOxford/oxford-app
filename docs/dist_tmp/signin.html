<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aparecida Oxford | Sign-in</title>
    <script type="module" crossorigin src="./assets/chunk-t0nojR_f.js"></script>
    <script type="module" crossorigin src="./assets/app-DNE0NdYr.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/app-DOd25Qc3.css">
  </head>
  <body data-page="signin">
    <main class="mx-auto flex min-h-screen w-full max-w-md items-center px-4 py-8">
      <section class="w-full rounded-2xl border border-stone-200 bg-white p-6 shadow-sm dark:border-stone-700 dark:bg-stone-800 sm:p-8">
        <div class="mb-3 flex justify-end">
          <button id="theme-toggle-btn" class="btn-secondary px-3 py-1.5 text-xs">Tema</button>
        </div>
        <div class="mb-5 flex justify-center">
          <img
            src="./assets/logo_aparecida_oxford_b-ComoAON5.png"
            alt="Logo Aparecida Oxford"
            class="h-[270px] w-[320px] rounded-md object-contain dark:hidden"
          />
          <img
            src="./assets/logo_aparecida_oxford_T-CmJ-veDh.png"
            alt="Brasão Aparecida Oxford"
            class="hidden h-[270px] w-[320px] rounded-md object-contain dark:block"
          />
        </div>
        <h1 class="text-2xl text-center font-bold text-stone-900 dark:text-stone-100">Controle de Acesso</h1>
        <p class="mt-2 text-sm text-stone-600 dark:text-stone-300">Informe seu usuário e senha.</p>

        <form id="signin-form" class="mt-6 space-y-4" novalidate>
          <label class="block text-sm font-medium text-stone-700 dark:text-stone-200" for="username">Usuário</label>
          <input id="username" name="username" class="input-field" autocomplete="username" required />

          <label class="block text-sm font-medium text-stone-700 dark:text-stone-200" for="password">Senha</label>
          <input id="password" name="password" type="password" class="input-field" autocomplete="current-password" required />

          <p id="signin-error" class="hidden rounded-md border border-red-200 bg-red-50 px-3 py-2 text-sm text-red-700"></p>

          <button type="submit" class="btn-primary w-full">Entrar</button>
        </form>

        <p class="mt-4 text-center text-sm text-stone-600 dark:text-stone-300">
          <a href="./index.html" class="font-medium text-amber-700 hover:text-amber-800">Voltar ao início</a>
        </p>
      </section>
    </main>
  </body>
</html>
